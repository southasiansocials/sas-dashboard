<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>South Asian Socials Dashboard</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #0C0C0C; color: #F0F0F0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .hub { max-width: 600px; text-align: center; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { color: #888; font-size: 13px; margin-bottom: 24px; }
    .links { display: flex; flex-direction: column; gap: 8px; }
    a { display: block; padding: 14px 20px; background: #141414; border: 1px solid #2A2A2A; border-radius: 8px; color: #F0F0F0; text-decoration: none; font-size: 14px; transition: border-color 0.15s; }
    a:hover { border-color: #60A5FA; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; margin-left: 8px; font-weight: 600; }
    .b-green { background: rgba(34,197,94,0.15); color: #22C55E; }
    .b-blue { background: rgba(96,165,250,0.15); color: #60A5FA; }
    .b-purple { background: rgba(167,139,250,0.15); color: #A78BFA; }
    .b-amber { background: rgba(245,158,11,0.15); color: #F59E0B; }
    .b-pink { background: rgba(236,72,153,0.15); color: #EC4899; }
  </style>
  <script>
    // Forward any ?api=... override to the linked dashboards (useful for dev against a non-prod backend).
    // In normal use, the dashboards default to https://api.southasiansocials.com on their own.
    const api = new URLSearchParams(location.search).get('api');
    function makeUrl(page) {
      return api ? `${page}?api=${encodeURIComponent(api)}` : page;
    }
    window.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('[data-page]').forEach(el => {
        el.href = makeUrl(el.dataset.page);
      });
    });
  </script>
</head>
<body>
  <div class="hub">
    <h1>South Asian Socials</h1>
    <p>Dashboard Hub — pick a view</p>
    <div class="links">
      <a data-page="content_calendar_live.html" href="#">Growth Calendar <span class="badge b-green">LIVE</span></a>
      <a data-page="ig_post_analytics.html" href="#">Post Analytics <span class="badge b-purple">DEEP DIVE</span></a>
      <a data-page="instagram_dashboard.html" href="#">Instagram Overview <span class="badge b-blue">INSIGHTS</span></a>
      <a data-page="ig_live_dashboard.html" href="#">IG Live Dashboard <span class="badge b-green">LIVE</span></a>
      <a data-page="ig_competitors.html" href="#">Competitor Intel <span class="badge b-pink">COMPARE</span></a>
      <a data-page="eventbrite_live_dashboard.html" href="#">Events Dashboard <span class="badge b-amber">EVENTS</span></a>
    </div>
  </div>
</body>
</html>
