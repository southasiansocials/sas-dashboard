<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Competitor Intel — South Asian Socials</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0C0C0C;
  --bg-card: #141414;
  --bg-elevated: #1A1A1A;
  --bg-input: #111111;
  --border: #2A2A2A;
  --border-focus: #444;
  --text: #F0F0F0;
  --text-muted: #888;
  --text-dim: #555;
  --accent: #FFFFFF;
  --green: #22C55E;
  --red: #EF4444;
  --amber: #F59E0B;
  --blue: #60A5FA;
  --purple: #A78BFA;
  --pink: #EC4899;
  --cyan: #22D3EE;
  --radius: 8px;
  --radius-sm: 5px;
  --radius-pill: 99px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  padding: 1.5rem 1.75rem 4rem;
  max-width: 1440px; margin: 0 auto;
}
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

.top-bar {
  display: flex; align-items: flex-start;
  justify-content: space-between; flex-wrap: wrap;
  gap: 14px; margin-bottom: 1.75rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--border);
}
.top-bar h1 {
  font-size: 18px; font-weight: 600;
  color: var(--accent); letter-spacing: -0.4px;
  display: flex; align-items: center; gap: 10px;
}
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 0 rgba(34,197,94,0.6);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
  70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); }
  100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
}
.live-dot.warn { background: var(--amber); animation: none; }
.live-dot.err { background: var(--red); animation: none; }
.top-bar .subtitle {
  font-size: 12px; color: var(--text-muted);
  margin-top: 4px;
}
.nav-links { display: flex; gap: 6px; flex-wrap: wrap; }
.nav-link {
  font-size: 12px; padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text-muted);
  transition: all 0.12s; cursor: pointer;
}
.nav-link:hover { border-color: var(--border-focus); color: var(--text); text-decoration: none; }
.nav-link.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.nav-link.primary { background: var(--blue); color: #000; border-color: var(--blue); font-weight: 600; }
.nav-link.primary:hover { background: #7ab4fc; }
.nav-link:disabled { opacity: 0.5; cursor: not-allowed; }

.controls {
  display: flex; gap: 10px; align-items: center;
  flex-wrap: wrap; margin-bottom: 1.25rem;
}
.controls label {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.06em;
}
input[type="text"] {
  font-size: 12px; padding: 7px 11px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text); outline: none;
  min-width: 360px; flex: 1;
}

/* KPI row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px; margin-bottom: 1.5rem;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.stat-card .label {
  font-size: 10px; color: var(--text-muted);
  margin-bottom: 8px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.07em;
}
.stat-card .value {
  font-size: 22px; font-weight: 700;
  color: var(--text); letter-spacing: -0.5px;
  font-variant-numeric: tabular-nums;
}
.stat-card .sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.stat-card .value.green { color: var(--green); }
.stat-card .value.blue  { color: var(--blue);  }
.stat-card .value.purple{ color: var(--purple);}
.stat-card .value.pink  { color: var(--pink);  }
.stat-card .value.amber { color: var(--amber); }
.stat-card .value.cyan  { color: var(--cyan);  }

.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; margin-top: 1.75rem;
}
.section-header h2 {
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.section-header .hint { font-size: 11px; color: var(--text-dim); }

.panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
}
.panel h3 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.panel .panel-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 16px; }
.chart-wrap { position: relative; height: 280px; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
@media (max-width: 900px) {
  .two-col, .three-col { grid-template-columns: 1fr; }
}

/* Competitor cards */
.competitor-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 12px; margin-bottom: 1.5rem;
}
.comp-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.comp-card.us {
  border-color: var(--green);
  background: linear-gradient(135deg, rgba(34,197,94,0.04), var(--bg-card));
}
.comp-card.err {
  border-color: rgba(239,68,68,0.3);
  background: linear-gradient(135deg, rgba(239,68,68,0.04), var(--bg-card));
}
.comp-head {
  display: flex; gap: 12px; align-items: center;
  margin-bottom: 12px;
}
.comp-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  object-fit: cover; background: var(--bg-elevated);
  border: 1px solid var(--border);
}
.comp-title {
  flex: 1; min-width: 0;
}
.comp-handle {
  font-size: 13px; font-weight: 600; color: var(--text);
  display: flex; align-items: center; gap: 6px;
}
.comp-name {
  font-size: 11px; color: var(--text-muted);
  margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.comp-bio {
  font-size: 11px; color: var(--text-muted);
  margin: 6px 0 10px;
  line-height: 1.45;
  max-height: 46px; overflow: hidden;
}
.comp-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  padding: 10px 0 12px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  margin-bottom: 10px;
}
.comp-stats .cs-label {
  font-size: 9px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.05em;
  font-weight: 600;
}
.comp-stats .cs-val {
  font-size: 16px; font-weight: 700; color: var(--text);
  margin-top: 2px; font-variant-numeric: tabular-nums;
}
.comp-meta-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-bottom: 10px;
}
.comp-meta {
  font-size: 10px; color: var(--text-muted);
}
.comp-meta strong {
  font-size: 12px; color: var(--text);
  font-weight: 600; display: block; margin-top: 2px;
}
.comp-mix {
  display: flex; height: 6px; border-radius: 3px; overflow: hidden;
  background: var(--bg-elevated); margin-top: 4px;
}
.comp-mix div { height: 100%; }
.comp-mix .img { background: var(--blue); }
.comp-mix .reel { background: var(--purple); }
.comp-mix .car { background: var(--pink); }
.comp-mix-legend {
  display: flex; gap: 8px; font-size: 9px;
  color: var(--text-muted); margin-top: 4px;
  flex-wrap: wrap;
}
.comp-mix-legend span::before {
  content: ''; display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; margin-right: 4px; vertical-align: middle;
}
.comp-mix-legend .img::before { background: var(--blue); }
.comp-mix-legend .reel::before { background: var(--purple); }
.comp-mix-legend .car::before { background: var(--pink); }

.err-msg {
  font-size: 11px; color: var(--red);
  padding: 10px; background: rgba(239,68,68,0.05);
  border-radius: var(--radius-sm); margin-top: 8px;
  line-height: 1.4;
}

/* Leaderboard table */
.board-table {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
table {
  width: 100%; border-collapse: collapse; font-size: 12px;
}
th {
  text-align: left; padding: 11px 14px;
  color: var(--text-muted); font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.05em;
  font-size: 10px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
}
th.num { text-align: right; }
td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text); font-variant-numeric: tabular-nums;
  vertical-align: middle;
}
td.num { text-align: right; }
tr:last-child td { border-bottom: 0; }
tbody tr:hover { background: rgba(255,255,255,0.02); }
tr.us-row { background: rgba(34,197,94,0.04); }
tr.us-row:hover { background: rgba(34,197,94,0.06); }
.rank {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg-elevated); color: var(--text-muted);
  font-size: 10px; font-weight: 700;
}
.rank-1 { background: rgba(245,158,11,0.2); color: var(--amber); }
.rank-2 { background: rgba(156,163,175,0.15); color: #ccc; }
.rank-3 { background: rgba(180,83,9,0.2); color: #f59e0b; }

.pill {
  display: inline-block; padding: 2px 8px;
  font-size: 10px; border-radius: var(--radius-pill);
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
}
.pill-image { background: rgba(96,165,250,0.15); color: var(--blue); }
.pill-reel  { background: rgba(167,139,250,0.15); color: var(--purple); }
.pill-carousel { background: rgba(236,72,153,0.15); color: var(--pink); }
.muted { color: var(--text-muted); }

.insight-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 10px; margin-bottom: 1.5rem;
}
.insight-card {
  background: linear-gradient(135deg, rgba(96,165,250,0.05), rgba(167,139,250,0.05));
  border: 1px solid rgba(96,165,250,0.2);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.insight-card .ic-label {
  font-size: 10px; text-transform: uppercase;
  color: var(--blue); letter-spacing: 0.1em;
  font-weight: 600; margin-bottom: 8px;
}
.insight-card .ic-val {
  font-size: 16px; font-weight: 700;
  color: var(--text); margin-bottom: 6px;
  letter-spacing: -0.3px;
}
.insight-card .ic-sub {
  font-size: 11px; color: var(--text-muted); line-height: 1.5;
}
.insight-card .ic-sub strong { color: var(--text); }

.top-posts-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 10px;
}
.tp-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
}
.tp-header {
  display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
}
.tp-header img {
  width: 22px; height: 22px; border-radius: 50%;
  object-fit: cover; background: var(--bg-elevated);
}
.tp-handle { font-size: 11px; color: var(--text-muted); font-weight: 600; }
.tp-thumb {
  width: 100%; aspect-ratio: 1; object-fit: cover;
  border-radius: var(--radius-sm); background: var(--bg-elevated);
}
.tp-meta {
  display: flex; justify-content: space-between;
  margin-top: 8px; font-size: 10px; color: var(--text-muted);
}
.tp-meta strong { color: var(--text); font-size: 11px; font-weight: 600; }

.banner {
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 12px;
  margin-bottom: 1rem;
}
.banner-err { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: var(--red); }
.banner-warn { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25); color: var(--amber); }

.loading {
  padding: 3rem; color: var(--text-muted);
  font-size: 13px; text-align: center;
}
.spinner {
  display: inline-block;
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--border);
  border-top-color: var(--blue);
  animation: spin 0.8s linear infinite;
  margin-right: 10px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<div class="top-bar">
  <div>
    <h1><span class="live-dot" id="live-dot"></span> Competitor Intel</h1>
    <div class="subtitle" id="subtitle">Analyzing @southasiansocials vs 5 competitors…</div>
  </div>
  <div class="nav-links">
    <button class="nav-link primary" id="refresh-btn" onclick="loadAll(true)">↻ Refresh</button>
    <a href="eventbrite_live_dashboard.html" class="nav-link">Events</a>

    <a href="ig_post_analytics.html" class="nav-link">Post Analytics</a>

  </div>
</div>

<div class="controls">
  <label>Competitors</label>
  <input type="text" id="usernames-input" value="mohanmatchmaking_,offlinebyhappyhour,letssocialiseofficial,thursday.toronto,doseoftravelclub">
  <button class="nav-link" onclick="loadAll(true)">Apply</button>
</div>

<div id="banner-slot"></div>
<div id="content-slot">
  <div class="loading"><span class="spinner"></span> Pulling competitor data from Instagram Business Discovery API…</div>
</div>

<script>
// Resolve API base URL:
//   1) ?api=... query param (explicit override)
//   2) localhost / file:// → local dev proxy on :3001
//   3) otherwise → production HTTPS proxy
const _qApi = new URLSearchParams(location.search).get('api');
const _isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:';
const PROXY = _qApi || (_isLocal ? 'http://localhost:3001' : 'https://api.southasiansocials.com');

// ── Helpers ────────────────────────────────────────────────
const fmt = n => (n ?? 0).toLocaleString('en-US');
const fmt1 = n => (n ?? 0).toLocaleString('en-US', { maximumFractionDigits: 1 });
const fmtPct = n => (n ?? 0).toFixed(2) + '%';
const fmtDate = d => new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
const escHtml = s => (s || '').toString().replace(/[&<>"']/g, c => (
  { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
));
const daysBetween = (a, b) => Math.floor((b - a) / 86400000);

function setDotState(state) {
  document.getElementById('live-dot').className = 'live-dot' + (state === 'ok' ? '' : state === 'warn' ? ' warn' : ' err');
}
function showBanner(kind, msg) {
  const slot = document.getElementById('banner-slot');
  slot.innerHTML += `<div class="banner banner-${kind}">${msg}</div>`;
}
function clearBanner() { document.getElementById('banner-slot').innerHTML = ''; }

// Analyze a set of posts (returns null if none)
function analyzePosts(posts) {
  if (!posts || !posts.length) return null;
  const now = Date.now();
  const n = posts.length;
  const total_likes = posts.reduce((s, p) => s + p.likes, 0);
  const total_comments = posts.reduce((s, p) => s + p.comments, 0);
  const avg_likes = total_likes / n;
  const avg_comments = total_comments / n;

  // Date range
  const timestamps = posts.map(p => new Date(p.timestamp).getTime()).sort((a, b) => a - b);
  const oldest = timestamps[0];
  const newest = timestamps[timestamps.length - 1];
  const spanDays = Math.max(1, (newest - oldest) / 86400000);
  const posts_per_week = (n / spanDays) * 7;
  const days_since_last = Math.round((now - newest) / 86400000);

  // Type mix
  const typeCount = { 'IG image': 0, 'IG reel': 0, 'IG carousel': 0 };
  posts.forEach(p => { if (typeCount[p.type] != null) typeCount[p.type]++; });
  const typeMix = {
    image: (typeCount['IG image'] / n) * 100,
    reel: (typeCount['IG reel'] / n) * 100,
    carousel: (typeCount['IG carousel'] / n) * 100,
  };

  // Type-level avg likes
  const typeStats = {};
  for (const t of ['IG image', 'IG reel', 'IG carousel']) {
    const sub = posts.filter(p => p.type === t);
    if (!sub.length) continue;
    typeStats[t] = {
      count: sub.length,
      avg_likes: sub.reduce((s, p) => s + p.likes, 0) / sub.length,
      avg_comments: sub.reduce((s, p) => s + p.comments, 0) / sub.length,
    };
  }

  // Top 3
  const top3 = [...posts].sort((a, b) => b.likes - a.likes).slice(0, 3);

  return {
    sample_size: n,
    total_likes, total_comments,
    avg_likes, avg_comments,
    posts_per_week,
    days_since_last,
    typeMix, typeCount, typeStats,
    top3,
    span_days: spanDays,
  };
}

// Build competitor record with engagement metrics
function buildRecord(c, ownFollowers, isUs = false) {
  if (!c.ok) return { ok: false, username: c.username, error: c.error, isUs };
  const profile = c.profile;
  const analysis = analyzePosts(c.posts);
  const followers = profile.followers || 0;
  const engagement_rate = followers && analysis
    ? ((analysis.avg_likes + analysis.avg_comments) / followers) * 100
    : 0;
  return {
    ok: true,
    isUs,
    username: c.username,
    profile,
    posts: c.posts,
    analysis,
    engagement_rate,
    followers,
  };
}

// ── Fetch ──────────────────────────────────────────────────
async function fetchCompetitors(usernames, forceFresh) {
  const q = encodeURIComponent(usernames.join(','));
  const url = `${PROXY}/api/ig/competitors?usernames=${q}${forceFresh ? '&fresh=1' : ''}`;
  const r = await fetch(url);
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || 'Competitor fetch failed');
  return d;
}
async function fetchSelf(forceFresh) {
  // Reuse existing endpoints for our own profile + posts
  const [meRes, postsRes] = await Promise.all([
    fetch(`${PROXY}/api/ig/me`).then(r => r.json()),
    fetch(`${PROXY}/api/ig/posts?days=90${forceFresh ? '&fresh=1' : ''}`).then(r => r.json()),
  ]);
  if (!meRes.ok) throw new Error('Self-profile fetch failed: ' + meRes.error);
  if (!postsRes.ok) throw new Error('Self-posts fetch failed: ' + postsRes.error);
  return {
    username: meRes.account.username,
    ok: true,
    profile: {
      name: meRes.account.name,
      biography: '',
      website: null,
      followers: meRes.account.followers_count || 0,
      following: 0,
      media_count: meRes.account.media_count || 0,
      profile_picture_url: meRes.account.profile_picture_url || null,
    },
    // Flatten posts to match competitor shape (likes + comments)
    posts: (postsRes.posts || []).map(p => ({
      id: p.id,
      caption: p.caption,
      timestamp: p.timestamp,
      permalink: p.permalink,
      thumbnail: p.thumbnail,
      likes: p.likes,
      comments: p.comments,
      type: p.type,
    })),
  };
}

// ── Renderers ──────────────────────────────────────────────
function renderCompetitorCard(r) {
  if (!r.ok) {
    return `<div class="comp-card err">
      <div class="comp-head">
        <div class="comp-avatar"></div>
        <div class="comp-title">
          <div class="comp-handle">@${escHtml(r.username)}</div>
          <div class="comp-name muted">Data unavailable</div>
        </div>
      </div>
      <div class="err-msg">${escHtml(r.error)}</div>
    </div>`;
  }
  const a = r.analysis;
  const badge = r.isUs ? ' <span style="font-size:10px;background:var(--green);color:#000;padding:2px 6px;border-radius:10px;font-weight:700;">YOU</span>' : '';
  const site = r.profile.website
    ? `<a href="${escHtml(r.profile.website)}" target="_blank" style="font-size:10px">${escHtml(r.profile.website.replace(/^https?:\/\//, '').slice(0, 30))}</a>`
    : '<span class="muted">—</span>';
  return `<div class="comp-card${r.isUs ? ' us' : ''}">
    <div class="comp-head">
      ${r.profile.profile_picture_url
        ? `<img class="comp-avatar" src="${escHtml(r.profile.profile_picture_url)}" onerror="this.style.display='none'">`
        : '<div class="comp-avatar"></div>'}
      <div class="comp-title">
        <div class="comp-handle"><a href="https://www.instagram.com/${escHtml(r.username)}" target="_blank">@${escHtml(r.username)}</a>${badge}</div>
        <div class="comp-name">${escHtml(r.profile.name || '')}</div>
      </div>
    </div>
    <div class="comp-bio">${escHtml(r.profile.biography)}</div>
    <div class="comp-stats">
      <div><div class="cs-label">Followers</div><div class="cs-val">${fmt(r.profile.followers)}</div></div>
      <div><div class="cs-label">Posts</div><div class="cs-val">${fmt(r.profile.media_count)}</div></div>
      <div><div class="cs-label">Follows</div><div class="cs-val">${fmt(r.profile.following)}</div></div>
    </div>
    <div class="comp-meta-row">
      <div class="comp-meta">Engagement rate<strong>${fmtPct(r.engagement_rate)}</strong></div>
      <div class="comp-meta">Avg likes/post<strong>${fmt(Math.round(a?.avg_likes || 0))}</strong></div>
      <div class="comp-meta">Avg comments/post<strong>${fmt(Math.round(a?.avg_comments || 0))}</strong></div>
      <div class="comp-meta">Posts/week<strong>${fmt1(a?.posts_per_week || 0)}</strong></div>
      <div class="comp-meta">Last post<strong>${a ? (a.days_since_last + ' days ago') : '—'}</strong></div>
      <div class="comp-meta">Website<strong>${site}</strong></div>
    </div>
    <div class="comp-meta" style="font-size:10px;margin-bottom:2px">Format mix (sample of ${a?.sample_size || 0})</div>
    <div class="comp-mix">
      ${a?.typeMix ? `
        <div class="img" style="width:${a.typeMix.image}%"></div>
        <div class="reel" style="width:${a.typeMix.reel}%"></div>
        <div class="car" style="width:${a.typeMix.carousel}%"></div>
      ` : ''}
    </div>
    <div class="comp-mix-legend">
      <span class="img">image ${Math.round(a?.typeMix?.image || 0)}%</span>
      <span class="reel">reel ${Math.round(a?.typeMix?.reel || 0)}%</span>
      <span class="car">carousel ${Math.round(a?.typeMix?.carousel || 0)}%</span>
    </div>
  </div>`;
}

function renderLeaderboard(records, metric, label, formatter) {
  const ranked = [...records]
    .filter(r => r.ok)
    .sort((a, b) => (getMetric(b, metric) || 0) - (getMetric(a, metric) || 0));
  return `<div class="board-table"><table>
    <thead><tr>
      <th>#</th><th>Account</th><th class="num">${label}</th>
    </tr></thead>
    <tbody>
      ${ranked.map((r, i) => `<tr${r.isUs ? ' class="us-row"' : ''}>
        <td><span class="rank ${i < 3 ? 'rank-' + (i + 1) : ''}">${i + 1}</span></td>
        <td>@${escHtml(r.username)}${r.isUs ? ' <span class="muted">· you</span>' : ''}</td>
        <td class="num">${formatter(getMetric(r, metric))}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

function getMetric(r, key) {
  if (key === 'followers') return r.profile?.followers || 0;
  if (key === 'engagement') return r.engagement_rate || 0;
  if (key === 'posts_per_week') return r.analysis?.posts_per_week || 0;
  if (key === 'avg_likes') return r.analysis?.avg_likes || 0;
  if (key === 'avg_comments') return r.analysis?.avg_comments || 0;
  return 0;
}

let followerChart, engagementChart, cadenceChart, mixChart;
const chartDefaults = {
  responsive: true, maintainAspectRatio: false,
  plugins: {
    legend: { labels: { color: '#888', font: { size: 11 } } },
    tooltip: { backgroundColor: '#1A1A1A', titleColor: '#F0F0F0', bodyColor: '#F0F0F0', borderColor: '#2A2A2A', borderWidth: 1 }
  },
  scales: {
    x: { grid: { color: '#1A1A1A' }, ticks: { color: '#888', font: { size: 10 } } },
    y: { grid: { color: '#1A1A1A' }, ticks: { color: '#888', font: { size: 10 } }, beginAtZero: true }
  }
};

function renderCharts(records) {
  const ok = records.filter(r => r.ok);
  const labels = ok.map(r => '@' + r.username);
  const colors = ok.map(r => r.isUs ? '#22C55E' : '#60A5FA');

  const mk = (id, type, data, opts = {}) => {
    const ctx = document.getElementById(id).getContext('2d');
    return new Chart(ctx, {
      type, data, options: { ...chartDefaults, ...opts }
    });
  };

  if (followerChart) followerChart.destroy();
  followerChart = mk('followerChart', 'bar', {
    labels,
    datasets: [{ label: 'Followers', data: ok.map(r => r.profile.followers), backgroundColor: colors, borderRadius: 4 }]
  }, { plugins: { legend: { display: false }, tooltip: chartDefaults.plugins.tooltip } });

  if (engagementChart) engagementChart.destroy();
  engagementChart = mk('engagementChart', 'bar', {
    labels,
    datasets: [{ label: 'Engagement rate (%)', data: ok.map(r => +r.engagement_rate.toFixed(2)), backgroundColor: colors.map(c => c + 'CC'), borderRadius: 4 }]
  }, { plugins: { legend: { display: false }, tooltip: chartDefaults.plugins.tooltip } });

  if (cadenceChart) cadenceChart.destroy();
  cadenceChart = mk('cadenceChart', 'bar', {
    labels,
    datasets: [{ label: 'Posts per week', data: ok.map(r => +(r.analysis?.posts_per_week || 0).toFixed(1)), backgroundColor: colors.map(c => c + '99'), borderRadius: 4 }]
  }, { plugins: { legend: { display: false }, tooltip: chartDefaults.plugins.tooltip } });

  if (mixChart) mixChart.destroy();
  mixChart = mk('mixChart', 'bar', {
    labels,
    datasets: [
      { label: 'Image %',  data: ok.map(r => Math.round(r.analysis?.typeMix?.image || 0)),   backgroundColor: '#60A5FA', stack: 'mix', borderRadius: 2 },
      { label: 'Reel %',   data: ok.map(r => Math.round(r.analysis?.typeMix?.reel || 0)),    backgroundColor: '#A78BFA', stack: 'mix', borderRadius: 2 },
      { label: 'Carousel %', data: ok.map(r => Math.round(r.analysis?.typeMix?.carousel || 0)), backgroundColor: '#EC4899', stack: 'mix', borderRadius: 2 },
    ]
  }, {
    scales: {
      x: { ...chartDefaults.scales.x, stacked: true },
      y: { ...chartDefaults.scales.y, stacked: true, max: 100, ticks: { ...chartDefaults.scales.y.ticks, callback: v => v + '%' } }
    }
  });
}

function renderTopPosts(records) {
  const all = [];
  records.filter(r => r.ok).forEach(r => {
    (r.analysis?.top3 || []).forEach(p => all.push({ ...p, _user: r.username, _pic: r.profile.profile_picture_url, _isUs: r.isUs }));
  });
  all.sort((a, b) => b.likes - a.likes);
  const top = all.slice(0, 12);
  return top.map(p => `
    <a href="${escHtml(p.permalink)}" target="_blank" style="text-decoration:none">
      <div class="tp-card">
        <div class="tp-header">
          ${p._pic ? `<img src="${escHtml(p._pic)}" onerror="this.style.display='none'">` : ''}
          <div class="tp-handle">@${escHtml(p._user)}${p._isUs ? ' · you' : ''}</div>
        </div>
        ${p.thumbnail ? `<img class="tp-thumb" src="${escHtml(p.thumbnail)}" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<div class=tp-thumb></div>')">` : '<div class="tp-thumb"></div>'}
        <div class="tp-meta">
          <span>${fmtDate(p.timestamp)}</span>
          <strong>♥ ${fmt(p.likes)} · 💬 ${fmt(p.comments)}</strong>
        </div>
      </div>
    </a>
  `).join('');
}

function renderGapAnalysis(us, competitors) {
  const ok = competitors.filter(c => c.ok);
  if (!us || !us.ok || !ok.length) return '';

  const avgCompFollowers = ok.reduce((s, c) => s + c.followers, 0) / ok.length;
  const avgCompEng       = ok.reduce((s, c) => s + c.engagement_rate, 0) / ok.length;
  const avgCompCadence   = ok.reduce((s, c) => s + (c.analysis?.posts_per_week || 0), 0) / ok.length;

  const followerGap = us.followers - avgCompFollowers;
  const engGap = us.engagement_rate - avgCompEng;
  const cadenceGap = (us.analysis?.posts_per_week || 0) - avgCompCadence;

  const maxFollowers = ok.reduce((max, c) => c.followers > max.followers ? c : max, ok[0]);
  const maxEng = ok.reduce((max, c) => c.engagement_rate > max.engagement_rate ? c : max, ok[0]);
  const maxCadence = ok.reduce((max, c) => (c.analysis?.posts_per_week || 0) > (max.analysis?.posts_per_week || 0) ? c : max, ok[0]);

  const best = {
    image: ok.reduce((max, c) => (c.analysis?.typeMix?.image || 0) > (max.analysis?.typeMix?.image || 0) ? c : max, ok[0]),
    reel: ok.reduce((max, c) => (c.analysis?.typeMix?.reel || 0) > (max.analysis?.typeMix?.reel || 0) ? c : max, ok[0]),
    carousel: ok.reduce((max, c) => (c.analysis?.typeMix?.carousel || 0) > (max.analysis?.typeMix?.carousel || 0) ? c : max, ok[0]),
  };

  const gapCard = (label, mine, theirs, highlight) => {
    const diff = mine - theirs;
    const emoji = diff >= 0 ? '⬆' : '⬇';
    const color = diff >= 0 ? 'var(--green)' : 'var(--red)';
    return `<div class="insight-card">
      <div class="ic-label">${label}</div>
      <div class="ic-val">${highlight}</div>
      <div class="ic-sub" style="color:${color}">${emoji} ${Math.abs(diff).toFixed(2)} vs competitor avg</div>
    </div>`;
  };

  return `
    <div class="insight-grid">
      ${gapCard('Your followers',     us.followers,                     avgCompFollowers,   fmt(us.followers) + ' followers')}
      ${gapCard('Your engagement',    us.engagement_rate,               avgCompEng,         fmtPct(us.engagement_rate))}
      ${gapCard('Your cadence',       (us.analysis?.posts_per_week || 0), avgCompCadence,   fmt1(us.analysis?.posts_per_week || 0) + ' posts/week')}
      <div class="insight-card">
        <div class="ic-label">Leaders in the cohort</div>
        <div class="ic-val">@${escHtml(maxFollowers.username)}</div>
        <div class="ic-sub">Biggest following: <strong>${fmt(maxFollowers.followers)}</strong>. Best engagement: <strong>@${escHtml(maxEng.username)}</strong> @ <strong>${fmtPct(maxEng.engagement_rate)}</strong>. Most active: <strong>@${escHtml(maxCadence.username)}</strong> @ <strong>${fmt1(maxCadence.analysis?.posts_per_week || 0)}/wk</strong>.</div>
      </div>
      <div class="insight-card">
        <div class="ic-label">Format leaders</div>
        <div class="ic-val">Who owns each format?</div>
        <div class="ic-sub">Image: <strong>@${escHtml(best.image.username)}</strong> (${Math.round(best.image.analysis?.typeMix?.image || 0)}%). Reel: <strong>@${escHtml(best.reel.username)}</strong> (${Math.round(best.reel.analysis?.typeMix?.reel || 0)}%). Carousel: <strong>@${escHtml(best.carousel.username)}</strong> (${Math.round(best.carousel.analysis?.typeMix?.carousel || 0)}%).</div>
      </div>
    </div>
  `;
}

function renderKPIs(us, competitors) {
  const ok = competitors.filter(c => c.ok);
  const count = ok.length;
  const totalCompFollowers = ok.reduce((s, c) => s + c.followers, 0);
  const avgEng = count ? ok.reduce((s, c) => s + c.engagement_rate, 0) / count : 0;
  const avgCadence = count ? ok.reduce((s, c) => s + (c.analysis?.posts_per_week || 0), 0) / count : 0;
  const mostActive = ok.reduce((m, c) => (c.analysis?.posts_per_week || 0) > (m?.analysis?.posts_per_week || 0) ? c : m, ok[0]);
  const highestEng = ok.reduce((m, c) => c.engagement_rate > (m?.engagement_rate || 0) ? c : m, ok[0]);
  const biggest = ok.reduce((m, c) => c.followers > (m?.followers || 0) ? c : m, ok[0]);

  const myRankFollowers = [...[...ok, us]].sort((a, b) => b.followers - a.followers).findIndex(r => r.isUs) + 1;
  const myRankEng = [...[...ok, us]].sort((a, b) => b.engagement_rate - a.engagement_rate).findIndex(r => r.isUs) + 1;

  return `<div class="stats-row">
    <div class="stat-card"><div class="label">Tracking</div><div class="value">${count}</div><div class="sub">competitors + you</div></div>
    <div class="stat-card"><div class="label">Your followers</div><div class="value green">${fmt(us?.followers || 0)}</div><div class="sub">rank #${myRankFollowers || '—'} in cohort</div></div>
    <div class="stat-card"><div class="label">Your engagement</div><div class="value green">${fmtPct(us?.engagement_rate || 0)}</div><div class="sub">rank #${myRankEng || '—'} in cohort</div></div>
    <div class="stat-card"><div class="label">Competitor avg followers</div><div class="value blue">${fmt(Math.round(totalCompFollowers / Math.max(count, 1)))}</div></div>
    <div class="stat-card"><div class="label">Competitor avg engagement</div><div class="value blue">${fmtPct(avgEng)}</div></div>
    <div class="stat-card"><div class="label">Competitor avg cadence</div><div class="value amber">${fmt1(avgCadence)}/wk</div></div>
    <div class="stat-card"><div class="label">Most active</div><div class="value purple">@${escHtml(mostActive?.username || '—').slice(0, 14)}</div><div class="sub">${fmt1(mostActive?.analysis?.posts_per_week || 0)} posts/wk</div></div>
    <div class="stat-card"><div class="label">Highest engagement</div><div class="value pink">@${escHtml(highestEng?.username || '—').slice(0, 14)}</div><div class="sub">${fmtPct(highestEng?.engagement_rate || 0)}</div></div>
  </div>`;
}

// ── Main ───────────────────────────────────────────────────
async function loadAll(forceFresh) {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true; btn.textContent = '… Loading';
  clearBanner();
  document.getElementById('content-slot').innerHTML = `<div class="loading"><span class="spinner"></span> Pulling competitor data from Instagram Business Discovery API…</div>`;

  const usernames = document.getElementById('usernames-input').value
    .split(',').map(s => s.trim().replace(/^@/, '')).filter(Boolean);

  let compData, selfData;
  try {
    [compData, selfData] = await Promise.all([
      fetchCompetitors(usernames, forceFresh),
      fetchSelf(forceFresh),
    ]);
  } catch (e) {
    console.error(e);
    setDotState('err');
    showBanner('err', `✗ ${escHtml(e.message)}. Verify the proxy is running and your IG token is valid.`);
    document.getElementById('content-slot').innerHTML = '';
    btn.disabled = false; btn.textContent = '↻ Refresh';
    return;
  }

  setDotState('ok');
  const usRecord = buildRecord(selfData, 0, true);
  const compRecords = compData.competitors.map(c => buildRecord(c, usRecord.followers));
  const failed = compRecords.filter(r => !r.ok);
  if (failed.length) {
    showBanner('warn', `⚠ ${failed.length} account${failed.length > 1 ? 's' : ''} failed to load (most common cause: not a Business/Creator account): ${failed.map(f => '@' + f.username).join(', ')}`);
  }

  const allRecords = [usRecord, ...compRecords];

  const fetchedAt = new Date(compData.fetched_at);
  document.getElementById('subtitle').textContent =
    `@${usRecord.username} vs ${compRecords.filter(c => c.ok).length} competitors · updated ${fetchedAt.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })}${compData.cached ? ' (cached)' : ''}`;

  const slot = document.getElementById('content-slot');
  slot.innerHTML = `
    ${renderKPIs(usRecord, compRecords)}

    <div class="section-header"><h2>Gap analysis vs competitor average</h2><span class="hint">You vs cohort mean on each metric</span></div>
    ${renderGapAnalysis(usRecord, compRecords)}

    <div class="section-header"><h2>Every competitor at a glance</h2><span class="hint">Click handle to open profile</span></div>
    <div class="competitor-grid">
      ${allRecords.map(renderCompetitorCard).join('')}
    </div>

    <div class="section-header"><h2>Head-to-head charts</h2><span class="hint">You highlighted in green</span></div>
    <div class="two-col">
      <div class="panel"><h3>Followers</h3><div class="panel-sub">Total audience size</div><div class="chart-wrap"><canvas id="followerChart"></canvas></div></div>
      <div class="panel"><h3>Engagement rate</h3><div class="panel-sub">(avg likes + avg comments) / followers</div><div class="chart-wrap"><canvas id="engagementChart"></canvas></div></div>
    </div>
    <div class="two-col" style="margin-top:12px">
      <div class="panel"><h3>Posting cadence</h3><div class="panel-sub">Posts per week (based on 50-post sample)</div><div class="chart-wrap"><canvas id="cadenceChart"></canvas></div></div>
      <div class="panel"><h3>Format mix</h3><div class="panel-sub">% of sample that's image / reel / carousel</div><div class="chart-wrap"><canvas id="mixChart"></canvas></div></div>
    </div>

    <div class="section-header"><h2>Leaderboards</h2><span class="hint">You highlighted · top 3 ranked</span></div>
    <div class="three-col">
      <div>
        <div class="section-header" style="margin-top:0"><h2 style="text-transform:none;letter-spacing:0;font-size:12px;color:var(--text)">By followers</h2></div>
        ${renderLeaderboard(allRecords, 'followers', 'Followers', fmt)}
      </div>
      <div>
        <div class="section-header" style="margin-top:0"><h2 style="text-transform:none;letter-spacing:0;font-size:12px;color:var(--text)">By engagement rate</h2></div>
        ${renderLeaderboard(allRecords, 'engagement', 'ER %', v => fmtPct(v))}
      </div>
      <div>
        <div class="section-header" style="margin-top:0"><h2 style="text-transform:none;letter-spacing:0;font-size:12px;color:var(--text)">By posting cadence</h2></div>
        ${renderLeaderboard(allRecords, 'posts_per_week', 'Posts/wk', v => fmt1(v))}
      </div>
    </div>

    <div class="section-header"><h2>Top posts across the cohort</h2><span class="hint">Best-performing content from any of these accounts</span></div>
    <div class="top-posts-row">${renderTopPosts(allRecords)}</div>
  `;

  renderCharts(allRecords);

  btn.disabled = false; btn.textContent = '↻ Refresh';
}

loadAll(false);
setInterval(() => loadAll(false), 15 * 60 * 1000);
</script>
